name: Build & Push Docker Image

on:
  push:
    branches:
      - master

jobs:
  docker:
    runs-on: docker
    env:
      DOCKER_HOST: tcp://127.0.0.1:2376
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: jblikdocker/barracudas4-website:latest
  deploy:
    runs-on: host
    needs: docker
    steps:
      - run: ssh -i ${{ secrets.DEPLOY_SERVER_SSH_KEY_FILE }} -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=10 root@${{ secrets.DEPLOY_SERVER_IP }} "docker pull jblikdocker/barracudas4-website:latest && docker stop barracudas4-website && docker rm barracudas4-website && ${{ secrets.DOCKER_RUN_COMMAND }}"
